<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Siber Tic Tac Toe</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-database-compat.js"></script>
</head>
<body>

    <div class="container">
        <h1>SİBER TIC TAC TOE</h1>
        
        <div id="status" class="status">Mod Seçiniz</div>

        <div id="menu" class="menu">
            <button onclick="startLocalGame()">Yerel (2 Oyuncu)</button>
            <button onclick="startAiGame()">Yapay Zeka</button>
            <button onclick="startOnlineGame()">Online Eşleş</button>
        </div>

        <div id="game-board" class="board hidden">
            <div class="cell" data-index="0"></div>
            <div class="cell" data-index="1"></div>
            <div class="cell" data-index="2"></div>
            <div class="cell" data-index="3"></div>
            <div class="cell" data-index="4"></div>
            <div class="cell" data-index="5"></div>
            <div class="cell" data-index="6"></div>
            <div class="cell" data-index="7"></div>
            <div class="cell" data-index="8"></div>
        </div>

        <button id="reset-btn" class="hidden" onclick="resetGame()">Yeniden Başlat</button>
    </div>

    <script src="app.js"></script>
</body>
</html>
