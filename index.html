<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Siber Tic Tac Toe</title>
    <link rel="stylesheet" href="style.css">
    <link rel="manifest" href="manifest.json">
</head>
<body>

    <div class="container">
        <div class="header-row">
            <h1>SİBER TIC TAC TOE</h1>
            <button id="btn-settings-toggle" class="icon-btn hidden">⚙️</button>
        </div>
        
        <div id="status" class="status">Giriş Yapmanız Bekleniyor...</div>

        <div id="auth-box" class="auth-box">
            <input type="email" id="auth-email" placeholder="E-posta">
            <input type="password" id="auth-password" placeholder="Şifre">
            <div class="auth-buttons">
                <button id="btn-login">Giriş Yap</button>
                <button id="btn-register">Kayıt Ol</button>
            </div>
        </div>

        <div id="menu" class="menu hidden">
            <button id="btn-local">Yerel (2 Oyuncu)</button>
            <button id="btn-ai">Yapay Zeka</button>
            <button id="btn-leaderboard-toggle">🏆 En Hızlılar (Skor Tablosu)</button>
            
            <hr style="border: 1px solid #3b4261; margin: 15px 0;">
            
            <div class="online-menu">
                <input type="text" id="room-pin" placeholder="6 Haneli Oda Şifresi" maxlength="6">
                <button id="btn-create-room">Özel Oda Kur</button>
                <button id="btn-join-room">Odaya Katıl</button>
            </div>
        </div>

        <div id="game-board" class="board hidden">
            <div class="cell" data-index="0"></div>
            <div class="cell" data-index="1"></div>
            <div class="cell" data-index="2"></div>
            <div class="cell" data-index="3"></div>
            <div class="cell" data-index="4"></div>
            <div class="cell" data-index="5"></div>
            <div class="cell" data-index="6"></div>
            <div class="cell" data-index="7"></div>
            <div class="cell" data-index="8"></div>
        </div>

        <button id="reset-btn" class="hidden">Ana Menüye Dön</button>
    </div>

    <div id="leaderboard-modal" class="modal hidden">
        <div class="modal-content">
            <h2>🏆 EN HIZLI KAZANANLAR</h2>
            <p style="font-size: 0.8rem; color: #aaa; margin-bottom: 10px;">(Online modda en kısa sürede bitiren ilk 5 oyuncu)</p>
            <ol id="leaderboard-list">
                </ol>
            <button id="btn-close-leaderboard">Kapat</button>
        </div>
    </div>

    <div id="settings-modal" class="modal hidden">
        <div class="modal-content">
            <h2>⚙️ AYARLAR</h2>
            <div class="setting-item">
                <label for="setting-sound">Oyun İçi Sesler:</label>
                <input type="checkbox" id="setting-sound" checked>
            </div>
            <button id="btn-close-settings">Kaydet ve Kapat</button>
        </div>
    </div>

    <script type="module" src="app.js"></script>
</body>
</html>
